name: Rust CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

env:
    CARGO_TERM_COLOR: always
    VCPKG_ROOT: ${{ github.workspace }}\vcpkg
    VCPKG_DEFAULT_TRIPLET: x64-windows-static-md

jobs:
    build:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4

            # actions-rs is deprecated. dtolnay is the community standard.
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy

            - name: Setup MSVC development environment
              uses: ilammy/msvc-dev-cmd@v1

            - name: Install LLVM for bindgen
              uses: KyleMayes/install-llvm-action@v2
              with:
                  version: "17.0.6"
                  directory: ${{ runner.temp }}\llvm

            - name: Verify Rust installation
              run: |
                  rustc --version
                  cargo --version

            - name: Install SDL2 dependencies with vcpkg
              run: |
                  git clone https://github.com/microsoft/vcpkg.git vcpkg
                  .\vcpkg\bootstrap-vcpkg.bat
                  .\vcpkg\vcpkg install sdl2:x64-windows-static-md sdl2-mixer:x64-windows-static-md

            - name: Add vcpkg to environment
              run: |
                  echo "VCPKG_INSTALLED_DIR=${{ github.workspace }}\vcpkg\installed\x64-windows-static-md" >> $env:GITHUB_ENV
                  echo "${{ github.workspace }}\vcpkg\installed\x64-windows-static-md\bin" >> $env:GITHUB_PATH

            - name: Rust cache
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: |
                      . -> target
                  cache-all-crates: true
                  # Fixed from 'main' to 'master' to match your trigger branches
                  save-if: ${{ github.ref == 'refs/heads/master' }}

            # - name: Clippy lints
            #   run: cargo clippy -- -D warnings

            - name: Build
              env:
                  LIBCLANG_PATH: ${{ runner.temp }}\llvm\bin
              run: |
                  $VcpkgPath = $env:VCPKG_INSTALLED_DIR

                  $env:RUSTFLAGS = "-L native=$VcpkgPath\lib"

                  $env:INCLUDE = "$VcpkgPath\include;" + $env:INCLUDE
                  $env:LIB = "$VcpkgPath\lib;" + $env:LIB

                  cargo build --release

            # - name: Run tests
            #   run: cargo test --release

            # - name: Upload artifact
            #   uses: actions/upload-artifact@v4
            #   with:
            #       name: windows-binary
            #       path: target/release/*.exe
